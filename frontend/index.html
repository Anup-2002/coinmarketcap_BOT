<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-4">
        <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Bot Control Panel</h1>
            <span id="backend-status-badge" class="badge bg-secondary">Checking Backend...</span>
        </header>

        <div class="row g-3 mb-4">
            <div class="col-md-3 col-sm-6">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Login Status</h6>
                        <h5 class="card-title" id="stat-login">Unknown</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Total / Remaining</h6>
                        <h5 class="card-title"><span id="stat-total">0</span> / <span id="stat-remaining">0</span></h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Generated / Posted</h6>
                        <h5 class="card-title"><span id="stat-generated">0</span> / <span id="stat-posted">0</span></h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Current Target</h6>
                        <h5 class="card-title text-truncate" id="stat-current-coin">-</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="card bg-dark border-secondary mb-4">
            <div class="card-header border-secondary">
                <h5 class="mb-0">Controls</h5>
            </div>
            <div class="card-body">
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-info action-btn" onclick="checkLogin()" id="btn-login">Check Login</button>
                    <button class="btn btn-primary action-btn" onclick="fullFlow()" id="btn-fetch">Fetch + Generate</button>
                    <button class="btn btn-success action-btn" onclick="startPosting()" id="btn-start">Start Posting</button>
                    <button class="btn btn-warning action-btn" onclick="resumePosting()" id="btn-resume">Resume Posting</button>
                    <button class="btn btn-secondary" onclick="refreshStatus()">Refresh Status</button>
                </div>
            </div>
        </div>

        <div class="card bg-dark border-secondary mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-1">
                    <span>Posting Progress</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="progress bg-secondary" style="height: 20px;">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Live Logs</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()">Clear</button>
            </div>
            <div class="card-body p-0">
                <div id="log-container" class="p-3 font-monospace small"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
